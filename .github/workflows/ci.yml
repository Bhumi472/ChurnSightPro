name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: churn_user
          POSTGRES_PASSWORD: churn_pass
          POSTGRES_DB: churndb
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Train model
        working-directory: backend
        run: python generate_model.py

      - name: Run pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql://churn_user:churn_pass@localhost:5432/churndb
        run: pytest tests/ -v

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }

      - name: Install & Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
